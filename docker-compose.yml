version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: raz_user
      POSTGRES_PASSWORD: raz_password
      POSTGRES_DB: raz_sof
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://raz_user:raz_password@db:5432/raz_sof
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-https://api.openai.com/v1}
      - HTTP_PROXY=${HTTP_PROXY}
      - HTTPS_PROXY=${HTTPS_PROXY}
    depends_on:
      - db
    volumes:
      - ./app:/app/app
      - ./static:/app/static
      - ./templates:/app/templates

volumes:
  postgres_data:
